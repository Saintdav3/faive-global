<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow, noarchive, nosnippet" />
    <title>Admin Login | Faive Global</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&family=Cormorant+Garamond:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/styles.css" />
    <link rel="stylesheet" href="/css/dashboard.css" />
  </head>
  <body data-page="admin-login" class="admin-auth-page">
    <div class="admin-grid-bg" aria-hidden="true">
      <div class="admin-grid admin-grid-primary"></div>
    </div>
    <main class="admin-auth-shell">
      <form id="admin-login-form" class="admin-auth-card" method="post" action="/admin/login" novalidate>
        <span class="eyebrow">Faive Global Admin</span>
        <h1>Dashboard</h1>
        <input
          class="form-control"
          type="email"
          name="email"
          placeholder="Email"
          required
        />
        <input
          class="form-control"
          type="password"
          name="password"
          placeholder="Password"
          required
        />
        <button class="btn btn-gold w-100" type="submit">Sign In</button>
        <p id="admin-login-feedback" class="form-feedback"></p>
      </form>
    </main>
    <script type="module" src="/js/admin-login.js"></script>
  </body>
</html>
